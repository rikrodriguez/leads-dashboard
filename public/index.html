<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lead Management - Gourmet Corp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#181c26;--surface2:#1e2333;--border:#2a2f42;--text:#e8eaf0;--muted:#7b82a0;--accent:#5b6af0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:24px}
h1{font-size:22px;font-weight:600}
.subtitle{color:var(--muted);font-size:13px;margin-top:3px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card-value{font-size:28px;font-weight:600;line-height:1}
.card-sub{font-size:11px;color:var(--muted);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.panel-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.bar-row{margin-bottom:11px}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.bar-track{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .6s ease}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.funnel-label{width:90px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0}
.funnel-track{flex:1;height:24px;background:var(--surface2);border-radius:5px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:5px;opacity:.9}
.funnel-n{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff}
.chart-wrap{position:relative;height:180px}
.legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:10px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.error{text-align:center;padding:40px;color:#D85A30;font-size:14px}
.pulse{width:8px;height:8px;border-radius:50%;background:#639922;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div><h1>Lead Management</h1><div class="subtitle" id="subtitle">Cargando...</div></div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="auto-cb" onchange="toggleAuto(this.checked)"/> Auto 1min</label>
    <button class="btn" onclick="loadData()">Actualizar</button>
  </div>
</div>
<div class="presets" id="presets">
  <button class="btn" onclick="setPreset('hoy',this)">Hoy</button>
  <button class="btn" onclick="setPreset('7d',this)">7 dias</button>
  <button class="btn" onclick="setPreset('30d',this)">30 dias</button>
  <button class="btn" onclick="setPreset('mes',this)">Este mes</button>
  <button class="btn active" onclick="setPreset('todo',this)">Todo</button>
</div>
<div id="main-content"><div class="loading">Conectando con Monday.com...</div></div>
<script>
var STATUS_COLOR={'New':'#378ADD','First Try':'#BA7517','Contacted':'#1D9E75','No Answer':'#888780','Follow1':'#9B59B6','Interested':'#E91E8C','Payment Link':'#00BCD4','Conversion':'#639922','Lost':'#D85A30'};
var FUNNEL_ORDER=['New','First Try','Contacted','Follow1','Interested','Payment Link','Conversion','No Answer','Lost'];
var STATUS_COL='color_mm1e35nf';
var allItems=[],filterRange={start:null,end:null},autoTimer=null,chartInst=null;
async function loadData(){
  try{
    var res=await fetch('/api/leads');
    if(!res.ok)throw new Error('Error '+res.status);
    var json=await res.json();
    if(json.error)throw new Error(json.error);
    allItems=json.data&&json.data.boards&&json.data.boards[0]&&json.data.boards[0].items_page&&json.data.boards[0].items_page.items||[];
    render();
  }catch(e){document.getElementById('main-content').innerHTML='<div class="error">'+e.message+'</div>';}
}
function setPreset(p,btn){
  document.querySelectorAll('.presets .btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var now=new Date();
  if(p==='hoy'){var s=new Date(now);s.setHours(0,0,0,0);filterRange={start:s,end:now};}
  else if(p==='7d'){var s=new Date(now);s.setDate(s.getDate()-7);s.setHours(0,0,0,0);filterRange={start:s,end:now};}
  else if(p==='30d'){var s=new Date(now);s.setDate(s.getDate()-30);s.setHours(0,0,0,0);filterRange={start:s,end:now};}
  else if(p==='mes'){filterRange={start:new Date(now.getFullYear(),now.getMonth(),1),end:now};}
  else{filterRange={start:null,end:null};}
  render();
}
function toggleAuto(on){if(autoTimer)clearInterval(autoTimer);if(on)autoTimer=setInterval(loadData,60000);}
function getFiltered(){return allItems.filter(function(item){if(!filterRange.start&&!filterRange.end)return true;var d=item.created_at?new Date(item.created_at):null;if(!d||isNaN(d))return true;if(filterRange.start&&d<filterRange.start)return false;if(filterRange.end&&d>filterRange.end)return false;return true;});}
function getCounts(items){var c={};items.forEach(function(item){var cv=item.column_values.find(function(x){return x.id===STATUS_COL;});var st=cv&&cv.text?cv.text:'Sin estado';c[st]=(c[st]||0)+1;});return c;}
function render(){
  var items=getFiltered(),counts=getCounts(items),total=items.length;
  var ventas=counts['Conversion']||0,noAnswer=counts['No Answer']||0,lost=counts['Lost']||0;
  var conv=total>0?((ventas/total)*100).toFixed(1):'0.0';
  var contactRate=total>0?(((total-noAnswer)/total)*100).toFixed(1):'0.0';
  var closeOnContact=(total-noAnswer)>0?((ventas/(total-noAnswer))*100).toFixed(1):'0.0';
  document.getElementById('subtitle').innerHTML='<span class="pulse"></span>'+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})+' - '+allItems.length+' leads';
  var tmap={};
  items.forEach(function(item){var d=item.created_at?new Date(item.created_at):null;if(!d||isNaN(d))return;var key=d.toISOString().slice(0,10);if(!tmap[key])tmap[key]={leads:0,conv:0};tmap[key].leads++;var cv=item.column_values.find(function(x){return x.id===STATUS_COL;});if(cv&&cv.text==='Conversion')tmap[key].conv++;});
  var timeline=Object.entries(tmap).sort(function(a,b){return a[0].localeCompare(b[0]);}).slice(-30);
  var allSt=[...new Set([...FUNNEL_ORDER,...Object.keys(counts)])].filter(function(s){return counts[s]>0;});
  var maxC=Math.max.apply(null,allSt.map(function(s){return counts[s]||0;}).concat([1]));
  var html='<div class="cards">';
  html+='<div class="card"><div class="card-label">Total leads</div><div class="card-value">'+total+'</div><div class="card-sub">en el periodo</div></div>';
  html+='<div class="card"><div class="card-label">Conversiones</div><div class="card-value" style="color:#639922">'+ventas+'</div><div class="card-sub">'+conv+'% conv. rate</div></div>';
  html+='<div class="card"><div class="card-label">No Answer</div><div class="card-value" style="color:#888780">'+noAnswer+'</div><div class="card-sub">'+(total>0?((noAnswer/total)*100).toFixed(1):0)+'% del total</div></div>';
  html+='<div class="card"><div class="card-label">Perdidos</div><div class="card-value" style="color:#D85A30">'+lost+'</div><div class="card-sub">'+(total>0?((lost/total)*100).toFixed(1):0)+'% del total</div></div>';
  html+='<div class="card"><div class="card-label">Contactabilidad</div><div class="card-value" style="color:#1D9E75">'+contactRate+'%</div><div class="card-sub">respondieron</div></div>';
  html+='<div class="card"><div class="card-label">Cierre/contactado</div><div class="card-value" style="color:#5b6af0">'+closeOnContact+'%</div><div class="card-sub">de los que responden</div></div>';
  html+='</div><div class="grid2"><div class="panel"><div class="panel-title">Distribucion por estado</div>';
  allSt.forEach(function(s){var pct=total>0?Math.round((counts[s]/total)*100):0;var col=STATUS_COLOR[s]||'#888';html+='<div class="bar-row"><div class="bar-meta"><span>'+s+'</span><span style="color:var(--muted)">'+counts[s]+' ('+pct+'%)</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';});
  html+='</div><div class="panel"><div class="panel-title">Funnel visual</div>';
  allSt.forEach(function(s){var n=counts[s]||0;var w=Math.max((n/maxC)*100,2);var col=STATUS_COLOR[s]||'#888';html+='<div class="funnel-row"><div class="funnel-label">'+s+'</div><div class="funnel-track"><div class="funnel-fill" style="width:'+w+'%;background:'+col+'"></div><span class="funnel-n">'+n+'</span></div></div>';});
  html+='</div></div><div class="panel"><div class="panel-title">Leads por dia</div><div class="legend"><span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#5b6af0"></span>Leads</span><span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#639922"></span>Conversiones</span></div><div class="chart-wrap"><canvas id="tc"></canvas></div></div>';
  document.getElementById('main-content').innerHTML=html;
  if(chartInst){try{chartInst.destroy();}catch(e){}}
  var ctx=document.getElementById('tc');
  if(ctx&&window.Chart){chartInst=new Chart(ctx,{type:'bar',data:{labels:timeline.map(function(x){return x[0].slice(5);}),datasets:[{label:'Leads',data:timeline.map(function(x){return x[1].leads;}),backgroundColor:'#5b6af0',borderRadius:3},{label:'Conv',data:timeline.map(function(x){return x[1].conv;}),backgroundColor:'#639922',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#7b82a0',font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:12}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#7b82a0',font:{size:10},precision:0}}}}});}
}
loadData();
</script>
</body>
</html>
